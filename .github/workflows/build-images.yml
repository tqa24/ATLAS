# Builds and publishes ATLAS service images to GHCR.
#
# Image names: ghcr.io/itigges22/atlas-{proxy,v3,lens,llama,llama-vulkan,sandbox}
#
# Tag scheme:
#   - main branch push  -> :latest, :sha-<short>
#   - dev branch push   -> :dev,    :sha-<short>
#   - git tag vX.Y.Z    -> :X.Y.Z,  :X.Y,  :latest
#   - manual dispatch   -> :sha-<short>
#
# Platform matrix:
#   - llama (CUDA, NVIDIA): amd64 only — CUDA arm64 needs base image swaps
#     (sbsa for DGX Spark, l4t for Jetson) that are tracked separately;
#     the default rockylinux9 base is x86_64-only.
#   - llama-vulkan (universal): amd64 always, +arm64 on tag pushes only
#     (#116). arm64 emulation via QEMU is 5-10x slower than native build,
#     so we only pay that cost when producing a release. Dev iteration
#     stays fast with amd64-only builds on every push.
#   - other services (proxy/v3/lens/sandbox): amd64 only for now; they're
#     small Python/Go images so adding arm64 later is a one-line change
#     to this matrix.

name: Build & publish container images

# Cancel an in-progress build for the same ref when a newer commit arrives.
# Branch refs (`refs/heads/dev`, `refs/heads/main`) get cancelled; tag refs
# (`refs/tags/v1.0.0`) won't conflict because the same tag can't be pushed
# twice. Per-ref grouping prevents a dev push from killing a main release.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
    # No `paths:` filter on purpose. GitHub applies path filters to BOTH
    # branch and tag pushes, so a `git tag v1.0.0 <existing-commit>` push
    # — which doesn't itself touch any files — would be silently skipped
    # if a paths filter were present, breaking release-by-tag. CI is cheap
    # (Buildx layer cache makes docs-only pushes near-instant); over-build
    # beats miss-build.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: proxy
            context: ./proxy
            dockerfile: ./proxy/Dockerfile
          - name: v3
            # Root context: v3-service/Dockerfile reads sibling dirs at build time.
            context: .
            dockerfile: ./v3-service/Dockerfile
          - name: lens
            context: ./geometric-lens
            dockerfile: ./geometric-lens/Dockerfile
          - name: sandbox
            context: ./sandbox
            dockerfile: ./sandbox/Dockerfile
          - name: llama
            context: ./inference
            dockerfile: ./inference/Dockerfile.v31
          # #116: universal Vulkan llama image. Same llama.cpp inside,
          # different backend at the cmake step. Multi-arch via QEMU on
          # tag pushes (see Set up QEMU step). Image name is suffixed
          # to keep it distinguishable from the CUDA llama on GHCR.
          - name: llama-vulkan
            context: ./inference
            dockerfile: ./inference/Dockerfile.vulkan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (large llama builds)
        if: matrix.service.name == 'llama' || matrix.service.name == 'llama-vulkan'
        # CUDA devel base (~9 GB) + runtime base (~4 GB) + llama.cpp build
        # artifacts (~5-8 GB) can peak at ~22-25 GB during a llama build.
        # ubuntu-latest has ~14 GB free out of the box. The community
        # `jlumbroso/free-disk-space` action reclaims ~30 GB by removing
        # Android SDK, dotnet, Haskell, large hosted-tool caches, etc.
        # That puts us comfortably under the limit.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false  # apt large-pkg removal is slow + low payoff
          docker-images: true
          swap-storage: false

      # #116: QEMU is required for the linux/arm64 build of llama-vulkan
      # on tag pushes. Skipping for everyone else keeps the setup time
      # negligible on dev/main pushes (binfmt registration is ~5s on
      # cold cache). Tag pushes are the only ones that include arm64.
      - name: Set up QEMU (multi-arch llama-vulkan only)
        if: matrix.service.name == 'llama-vulkan' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/atlas-${{ matrix.service.name }}
          # `flavor: latest=false` disables metadata-action's auto-latest
          # logic, which marks the current run's semver tag as `:latest`
          # within its own run — so a backport tag like `v0.9.5` pushed
          # AFTER `v1.0.0` would silently downgrade `:latest` to v0.9.5
          # for everyone. Instead, `:latest` is set explicitly below ONLY
          # on main pushes, so it tracks bleeding edge from main, and
          # users pin to versioned tags for stability.
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            # Restrict :X.Y to stable tags only — without `enable=`,
            # tagging `v1.0.0-rc1` after `v1.0.0` would silently flip
            # `:1.0` to point at the RC (downgrade for users pinned to
            # `:1.0`). Same class of footgun as auto-latest above.
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}

      # Cache strategy:
      #   llama / llama-vulkan -> registry-based cache (CUDA/Vulkan builds
      #             are ~6 GB; GHA cache is capped at 10 GB total per repo,
      #             so 6 services × mode=max would thrash. Registry cache
      #             has no size limit and lives alongside the published
      #             image.) mode=max also persists --mount=type=cache
      #             contents (#117 ccache) across runs.
      #   others -> GHA cache (small, fast, no extra registry write).
      - name: Build & push (llama CUDA, registry cache)
        if: matrix.service.name == 'llama'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/atlas-llama:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/atlas-llama:buildcache,mode=max
          provenance: false

      # #116: llama-vulkan with conditional arm64. The platforms
      # expression evaluates to amd64+arm64 only on tag pushes (releases),
      # amd64-only otherwise — keeps dev iteration fast since arm64
      # emulation via QEMU is 5-10x slower.
      - name: Build & push (llama Vulkan, registry cache, arch-conditional)
        if: matrix.service.name == 'llama-vulkan'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/atlas-llama-vulkan:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/atlas-llama-vulkan:buildcache,mode=max
          provenance: false

      - name: Build & push (small services, GHA cache)
        if: matrix.service.name != 'llama' && matrix.service.name != 'llama-vulkan'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          provenance: false
